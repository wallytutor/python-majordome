project:
  type: book

execute:
  cache:   true
  echo:    false
  warning: false

book:
  title: "Majordome"
  author: "Walter Dal'Maz Silva"
  date: "today"
  sidebar:
    style: "docked"
    search: true
    collapse-level: 1

  chapters:
    - index.qmd
    - majordome/magic.qmd
    - majordome/engineering.qmd
    - majordome/simulation.qmd
    - majordome/utilities.qmd
    - majordome/documents.qmd
    - majordome/_docs/references.qmd

bibliography: https://raw.githubusercontent.com/wallytutor/kompanion/refs/heads/main/notes/references.bib

format:
  html:
    reference-location: document
    highlight-style: github
    theme:
      - pulse

  pdf:
    reference-location: document
    highlight-style: github
    documentclass: scrreprt
    papersize: a4
    mainfont: "Latin Modern Sans"
    sansfont: "Latin Modern Sans"
    geometry:
      - margin=25mm
